<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Controle Online - Olho no Lance TV</title><link rel="stylesheet" href="style.css"></head>
<body class="control">
<header><img src="assets/olho-no-lance-tv.png"><div><h1>Olho no Lance TV</h1><p>Controle online do placar para OBS</p></div></header>
<main class="control-grid">
<section class="panel"><h2>Time Esquerda</h2><select id="teamASelect"></select><input id="teamAName" placeholder="Nome completo"><input id="abbrAInput" maxlength="4" placeholder="Abreviação"><div class="buttons"><button onclick="change('scoreA',-1)">- Gol</button><button onclick="change('scoreA',1)">+ Gol</button></div><div class="buttons"><button onclick="change('yellowA',-1)">- 🟨</button><button onclick="change('yellowA',1)">+ 🟨</button><button onclick="change('redA',-1)">- 🟥</button><button onclick="change('redA',1)">+ 🟥</button></div></section>
<section class="panel"><h2>Cronômetro</h2><select id="periodInput"><option>1º TEMPO</option><option>2º TEMPO</option><option>INTERVALO</option><option>PRORROGAÇÃO</option><option>PÊNALTIS</option><option>ENCERRADO</option></select><div id="timerPreview" class="timer-preview">00:00</div><div class="buttons"><button onclick="startTimer()">Iniciar</button><button onclick="pauseTimer()">Pausar</button><button onclick="resetTimer()">Zerar</button></div><div class="buttons"><button onclick="addSeconds(-60)">-1 min</button><button onclick="addSeconds(60)">+1 min</button></div><button class="danger" onclick="resetMatch()">Zerar tudo</button></section>
<section class="panel"><h2>Time Direita</h2><select id="teamBSelect"></select><input id="teamBName" placeholder="Nome completo"><input id="abbrBInput" maxlength="4" placeholder="Abreviação"><div class="buttons"><button onclick="change('scoreB',-1)">- Gol</button><button onclick="change('scoreB',1)">+ Gol</button></div><div class="buttons"><button onclick="change('yellowB',-1)">- 🟨</button><button onclick="change('yellowB',1)">+ 🟨</button><button onclick="change('redB',-1)">- 🟥</button><button onclick="change('redB',1)">+ 🟥</button></div></section>
</main>
<section class="panel info"><h2>Links</h2><p>Controle: <b>/control.html</b></p><p>OBS: <b>/overlay.html</b></p></section>
<script src="control.js"></script></body></html>
